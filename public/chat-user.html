<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Inference — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="chat-body">
  <div class="chat-layout">

  <!-- Sidebar -->
  <aside class="chat-sidebar">
    <input
    type="text"
    id="chatSearch"
    class="chat-search"
    placeholder="Search chats..."
  />
    <h3 class="sidebar-title">Previous Chats</h3>
    <div id="chatList"></div>
  </aside>

  <!-- Main Chat Area -->
  <div class="chat-main">

  <header class="chat-header">
    <span class="chat-logo">&#x25C6; LLM Interface</span>
    <div style="display:flex; align-items:center; gap:0.75rem;">
      <span class="chat-badge" id="userBadge">Signed in</span>
      <button class="btn btn-secondary" id="logoutBtn" style="padding:0.4rem 0.9rem; font-size:0.82rem;">Log out</button>
    </div>
  </header>

  <div class="chat-messages" id="chatMessages">
    <div class="chat-welcome" id="welcomeMsg">
      <h2>Hello!</h2>
      <p id="welcomeSub">Ask me anything.</p>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="chat-input-inner">
      <textarea
        id="chatInput"
        rows="1"
        placeholder="Ask anything…"
      ></textarea>
      <button class="chat-send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // ── Session guard ────────────────────────────────────────
    (async () => {
      try {
        const res  = await fetch("/api/auth/me");
        const data = await res.json();

        if (data.user) {
          // Badge shows email, welcome message shows username
          document.getElementById("userBadge").textContent = data.user.email;
          document.getElementById("welcomeSub").textContent =
            `Signed in as ${data.user.username}. Ask me anything.`;
        } else {
          window.location.href = "login.html";
        }
      } catch {
        window.location.href = "login.html";
      }
    })();

    // ── Logout ───────────────────────────────────────────────
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      try {
        await fetch("/api/auth/logout", { method: "POST" });
      } finally {
        window.location.href = "index.html";
      }
    });

    // ── Auto-resize textarea ─────────────────────────────────
    const chatInput = document.getElementById("chatInput");
    chatInput.addEventListener("input", () => {
      chatInput.style.height = "auto";
      chatInput.style.height = chatInput.scrollHeight + "px";
    });

    // ── Send on Enter (Shift+Enter for newline) ──────────────
    chatInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    document.getElementById("sendBtn").addEventListener("click", sendMessage);

    // ── Message rendering ────────────────────────────────────
    function appendMessage(role, text) {
      const welcome = document.getElementById("welcomeMsg");
      if (welcome) welcome.remove();

      const container = document.getElementById("chatMessages");
      const msg       = document.createElement("div");
      msg.className   = `message ${role}`;

      const bubble       = document.createElement("div");
      bubble.className   = "message-bubble";
      bubble.textContent = text;

      msg.appendChild(bubble);
      container.appendChild(msg);
      container.scrollTop = container.scrollHeight;
    }

    // ── Send message ─────────────────────────────────────────
    async function sendMessage() {
      const text    = chatInput.value.trim();
      const sendBtn = document.getElementById("sendBtn");

      if (!text) return;

      appendMessage("user", text);
      chatInput.value        = "";
      chatInput.style.height = "auto";
      sendBtn.disabled       = true;

      // Placeholder response — LLM integration comes in a future iteration
      appendMessage("assistant", "LLM inference is not yet connected. This is a placeholder response.");
      sendBtn.disabled = false;
    }

    // ── Fetch Chat History ─────────────────────────────────────────
    async function loadChats() {
  try {
    const res = await fetch("/api/chats");
    const chats = await res.json();

    const chatList = document.getElementById("chatList");
    chatList.innerHTML = "";

    chats.forEach(chat => {
      const item = document.createElement("div");
      item.className = "chat-item";
      item.textContent = chat.title || "New Chat";

      item.onclick = () => loadMessages(chat.id);

      chatList.appendChild(item);
    });
  } catch (err) {
    console.error("Failed to load chats");
  }
}

    // ── Load Chats ─────────────────────────────────────────
    async function loadMessages(chatId) {
  const res = await fetch(`/api/messages/${chatId}`);
  const messages = await res.json();

  const container = document.getElementById("chatMessages");
  container.innerHTML = "";

  messages.forEach(m => {
    appendMessage(m.sender, m.message);
  });
}
    loadChats();

    // ── Search Chats ─────────────────────────────────────────
    const searchInput = document.getElementById("chatSearch");

searchInput.addEventListener("input", async () => {
  const query = searchInput.value.trim();

  if (!query) {
    loadChats(); // reload all chats
    return;
  }
  
  const res = await fetch(`/api/chats/search?q=${encodeURIComponent(query)}`);
  const chats = await res.json();

  const chatList = document.getElementById("chatList");
  chatList.innerHTML = "";

  chats.forEach(chat => {
    const item = document.createElement("div");
    item.className = "chat-item";
    item.textContent = chat.title || "New Chat";

    item.onclick = () => loadMessages(chat.id);

    chatList.appendChild(item);
  });
});
    
  </script>
  </div>
</div>
</body>
</html>
