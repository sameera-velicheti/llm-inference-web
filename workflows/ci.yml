name: CI Testing Pipeline

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-suite:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm test

      - name: Run Acceptance Tests
        run: npm run test:acceptance